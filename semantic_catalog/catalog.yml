# Catalogo semantico do agente KOND (royalties de artistas).
#
# STATUS: VALIDADO contra o banco real em 2026-07-01. Fonte:
# public.vw_ft_dados_analiticos_union (ver config/postgres_sources.yml e
# config/column_dictionary.yml para o detalhe completo, incluindo notas de
# qualidade de dados).

metrics:
  quantity:
    label: Quantidade
    description: >
      Quantidade associada a linha. O significado varia por origem/tipo de
      receita (streams, unidades vendidas, contagem de shows, etc.) — ver
      config/column_dictionary.yml.
    expression_hint: sum(quantity)
  revenue:
    label: Receita
    description: Valor monetario (receita/royalty) associado a linha.
    expression_hint: sum(revenue)

dimensions:
  period:
    label: Periodo
    description: Mes de referencia, formato 'AAAA-MM' (grao mensal, nao diario).
  artist:
    label: Artista
    description: Nome do artista normalizado (casado contra o cadastro de artistas).
  origem:
    label: Origem
    description: >
      Sistema/distribuidora de origem da linha (DSU, Omie, Orchard,
      Universal, Warner Chappel, Warner Music).
  revenue_type:
    label: Tipo de receita
    description: Categoria da receita (Editora, Gravadora, Publicidade, Shows, N/D).

# Fonte aprovada para consulta. Hoje o agente le uma unica view ja
# consolidada entre distribuidoras (ver config/postgres_sources.yml::query_source).
approved_sources:
  - public.vw_ft_dados_analiticos_union
