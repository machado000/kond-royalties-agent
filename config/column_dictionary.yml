    - ft_warner_chappell_dados_analiticos  # fonte de origem='Warner Chappell' — ver detail_tables (preferir warner_chappell.stg_warner_statement)
    - ft_warner_music_dados_analiticos # fonte de origem='Warner Music' na view unificada — ver detail_tables
    - mv_ft_dados_analiticos_agg       # materialized view, pre-agregada (artist+period+origem+revenue_type) a partir de vw_ft_dados_analiticos_union, exclui origem='Omie' — NAO usada pelo agente hoje, 332 linhas em 2026-07-22
