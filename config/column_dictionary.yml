# Dicionario de colunas do agente KOND (royalties de artistas)
#
# STATUS: VALIDADO contra o banco real em 2026-07-01 via
# `kond-royalties-mcp describe-schema` + consultas de amostragem.
#
# A tabela de consulta configurada em config/postgres_sources.yml
# (query_source) e `public.vw_ft_dados_analiticos_union`: uma view que
# unifica, no schema `public`, as fact tables de todas as
# origens/distribuidoras em uma unica tabela larga. 10.3M linhas em
# 2026-07-01.
#
# Convencao: o nome canonico (chave) e o que o agente e o catalogo semantico
# usam em `expression_hint` (ver semantic_catalog/catalog.yml) e nas
# dimensoes (usadas como nome de coluna literal em mcp_server/query_builder.py).

canonical_columns:

  # --- Dimensao temporal ---
  period:
    description: >
      Periodo de referencia, grao MENSAL, formato texto 'AAAA-MM' (ex.:
      '2026-05'). NAO e uma coluna DATE — comparacoes de intervalo sao
      feitas por comparacao de string (funciona pois o formato ordena
      lexicograficamente igual a ordenacao cronologica).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.period
    notes:
      - "Existe tambem `revenue_period`, identico a `period` em todas as amostras observadas."

  # --- Dimensao de artista ---
  artist:
    description: >
      Nome do artista ja normalizado/casado (matched) contra
      `dim_artistas`. Preferir esta coluna a `artist_raw` (nome bruto como
      veio do arquivo de origem, antes do matching).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist

  # --- Dimensao de origem/distribuidora ---
  origem:
    description: >
      Sistema/distribuidora de onde a linha veio. Valores observados:
      'DSU', 'Omie', 'Orchard', 'Universal', 'Warner Chappel', 'Warner Music'.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origem
    notes:
      - "'Warner Chappel' (uma unica letra 'l') e o valor real gravado nesta
         coluna — divergente do nome do schema Postgres `warner_chappell`
         (duas letras 'l', grafia correta da empresa). Filtros devem usar a
         grafia com uma letra 'l' para bater com os dados."
      - "'Omie' e um sistema de ERP financeiro (contas a pagar/receber), nao
         um distribuidor de streaming — misturado nesta view junto com as
         fontes de royalties propriamente ditas."
      - "'DSU' cobre contratos/shows ao vivo (ver revenue_type='Shows'), nao
         apenas royalties de gravacao/edicao."

  # --- Dimensao de tipo de receita ---
  revenue_type:
    description: >
      Categoria/linha de negocio da receita. Valores observados: 'Editora'
      (publishing), 'Gravadora' (master/gravacao), 'Publicidade', 'Shows',
      'N/D' (nao definido).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.revenue_type

  # --- Metricas ---
  quantity:
    description: >
      Quantidade associada a linha (streams, unidades ou contagem,
      dependendo de origem/revenue_type — ex.: para origem='DSU' e
      revenue_type='Shows', observado quantity=1 por show/contrato, nao
      contagem de streams).
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.quantity

  revenue:
    description: >
      Valor monetario associado a linha (receita/royalty). Pode ser 0 (ex.:
      linhas de shows sem valor apurado ainda).
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.revenue

  # --- Colunas presentes na view mas AINDA NAO expostas no catalogo semantico ---
  # (documentadas para referencia futura, nao usadas em mcp_server/query_builder.py)
  razao_social:
    description: Razao social da entidade legal associada a linha (ex.: gravadora/empresa do artista).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.razao_social
  origin_table:
    description: Nome da fact table de origem antes da uniao (lineage/debug).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origin_table
  matched_artista_id:
    description: FK para public.dim_artistas.id — permite enriquecer com gravadora, CPF, IDs por plataforma, etc.
    type: INTEGER
    source: public.vw_ft_dados_analiticos_union.matched_artista_id
  artist_raw:
    description: Nome do artista como veio do arquivo de origem, antes do matching contra dim_artistas.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist_raw

tables:
  public:
    - vw_ft_dados_analiticos_union   # view unificada (query_source atual)
    - dim_artistas                     # artista: nome civil/artistico, gravadora, IDs por plataforma/distribuidor
    - dim_calendario                   # calendario diario (nao usado hoje — a view e mensal)
    - dim_canal                        # canal (nao referenciado diretamente pela view unificada)
    - dim_pais                         # pais (nao referenciado diretamente pela view unificada)
    - dim_contas
    - dim_omie_categoria
    - dim_omie_grupo
    - ft_dsu_controle_contratos
    - ft_dsu_dados_analiticos          # fonte de origem='DSU' na view unificada
    - ft_dsu_shows_logs
    - ft_omie_dados_analiticos         # fonte de origem='Omie' na view unificada
    - ft_orchard_dados_analiticos      # fonte de origem='Orchard' na view unificada
    - ft_somlivre_sonymusic            # NAO observado em origem= (verificar se esta incluido na view)
    - ft_universal_dados_analiticos    # fonte de origem='Universal' na view unificada
    - ft_warner_chappell_dados_analiticos  # fonte de origem='Warner Chappel' na view unificada
    - ft_warner_music_dados_analiticos # fonte de origem='Warner Music' na view unificada
    - stg_omie_consolidado
    - stg_orchard_revenue               # + variantes stg_orchard_revenue_YYYY_MM (particionado por mes)
    - stg_somlivre_sonymusic
    - stg_warner_music_details
    - vw_debug_dsu_dados_analiticos
    - vw_debug_omie_dados_analiticos
    - vw_debug_orchard_dados_analiticos
    - vw_debug_universal_dados_analiticos
    - vw_debug_warner_chappell_dados_analiticos
    - vw_debug_warner_music_dados_analiticos
  universal:
    - dim_cliente
    - dim_compositor
    - dim_fonte
    - dim_grupo_renda
    - dim_magmedia_fields
    - dim_musica
    - dim_tipo_renda
    - stg_universal_magmedia
  warner_chappell:
    - dim_exploitation_source
    - ft_warner_statement
    - stg_warner_statement
    - stg_warner_statement_old

data_quality_notes:
  public.vw_ft_dados_analiticos_union:
    - "10.3M linhas em 2026-07-01 (select count(*))."
    - "period/revenue_period sao TEXT em grao mensal ('AAAA-MM'), identicos em
       todas as amostras observadas — nao ha granularidade diaria nesta view."
    - "origem='Warner Chappel' (uma letra 'l') diverge da grafia correta e do
       nome do schema `warner_chappell` (duas letras 'l')."
    - "origem inclui 'Omie' (ERP financeiro geral) e 'DSU' (shows ao vivo),
       nao apenas distribuidoras de streaming/publishing — 'performance de
       royalties' nesta base e mais amplo, cobrindo qualquer receita
       associada a um artista."
    - "quantity=1 observado para origem='DSU' + revenue_type='Shows' —
       provavelmente contagem de shows/contratos, nao streams. O
       significado de quantity varia por origem/revenue_type e ainda nao
       foi mapeado exaustivamente."
    - "ft_somlivre_sonymusic nao apareceu nos valores distintos de origem
       observados na amostra inicial — confirmar se esta incluida na view
       ou se e uma fonte separada ainda nao unificada."
  universal:
    - "Schema de detalhe (dim_musica, dim_compositor, stg_universal_magmedia)
       ainda nao consultado pelo agente — apenas a fact table unificada em
       `public` e usada hoje."
  warner_chappell:
    - "Schema de detalhe (ft_warner_statement, stg_warner_statement) ainda
       nao consultado pelo agente — apenas a fact table unificada em
       `public` e usada hoje."
