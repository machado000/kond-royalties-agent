      tipo_receita: {type: TEXT}
      id: {type: INTEGER}
      nome_conta: {type: TEXT}
      pais: {type: TEXT, description: "Territorio — nao existe na view unificada"}
      loja: {type: TEXT, description: Loja/store de venda}
      artista_produto: {type: TEXT}
      produto: {type: TEXT, description: Album/release}
      artista_musica: {type: TEXT}
      titulo_musica: {type: TEXT, description: "Nome da faixa — nao existe na view unificada"}
