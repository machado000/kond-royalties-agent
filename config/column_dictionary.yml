      categoria: {type: VARCHAR}
      situacao: {type: VARCHAR}
      departamento: {type: VARCHAR}
      projeto: {type: VARCHAR, description: Projeto Omie — pode mapear a artista via `dim_artistas.omie_projeto`}
      data_de_inclusao: {type: DATE}
      data_de_vencimento: {type: DATE}
      ultima_data_de_pagto_ou_recbto: {type: DATE}
      dias_em_atraso: {type: INTEGER}
      situacao_do_vencimento: {type: VARCHAR}
      valor_da_conta: {type: NUMERIC}
      valor_liquido: {type: NUMERIC}
      juros: {type: NUMERIC}
      multa: {type: NUMERIC}
      desconto: {type: NUMERIC}
      pago_ou_recebido: {type: NUMERIC}
      a_pagar_ou_receber: {type: NUMERIC, description: "Provavel origem da coluna `cost` na view unificada"}
      numero_do_documento: {type: VARCHAR}
      parcela: {type: VARCHAR}
      cnpjcpf: {type: VARCHAR}
      cliente_ou_fornecedor_nome_fantasia: {type: VARCHAR}
      cliente_ou_fornecedor_razao_social: {type: VARCHAR}
      observacao_da_conta: {type: TEXT}
      observacao_do_pagto_ou_recbto: {type: TEXT}
      source_file: {type: TEXT}

  public.ft_orchard_dados_analiticos:
    description: >
      Statement Orchard (fonte de origem='Orchard' na view unificada). Tem
      detalhe de faixa (titulo_musica, ISRC) e territorio (pais) nao
      presentes na view unificada.
    columns:
      razao_social: {type: TEXT}
      apelido: {type: TEXT}
