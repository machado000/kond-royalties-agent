    - stg_somlivre_sonymusic
    - stg_warner_music_details
    - vw_debug_dsu_dados_analiticos               # IGNORAR — etapa de normalizacao, ver regra critica no topo
    - vw_debug_omie_dados_analiticos              # IGNORAR
    - vw_debug_orchard_dados_analiticos           # IGNORAR
    - vw_debug_universal_dados_analiticos         # IGNORAR
    - vw_debug_warner_chappell_dados_analiticos   # IGNORAR
    - vw_debug_warner_music_dados_analiticos      # IGNORAR
  universal:
    - dim_cliente        # referencia (codigo_cliente/nome_cliente) — nao referenciada pela view ft_universal_dados_analiticos atual (que usa public.dim_contas)
    - dim_compositor    # ver detail_tables
    - dim_fonte          # ja joinada dentro de ft_universal_dados_analiticos (-> coluna canal)
    - dim_grupo_renda    # ja joinada dentro de ft_universal_dados_analiticos (-> coluna media)
    - dim_magmedia_fields  # metadado de nomes de campo do relatorio Magmedia — nao referenciada pela view atual
    - dim_musica        # ver detail_tables
    - dim_tipo_renda     # referencia de tipos de renda — nao referenciada pela view atual
    - stg_universal_magmedia
  warner_chappell:
    - dim_exploitation_source   # load-bearing para warner_chappell_detail.platform, ver detail_tables
    - ft_warner_statement   # VIEW sobre stg_warner_statement desde 2026-07-22 (nao mais stale) — ver detail_tables
    - stg_warner_statement   # ATUAL — fonte real de warner_chappell_detail desde 2026-07-22, ver detail_tables
    - stg_warner_statement_old   # snapshot congelado, provavel origem de ft_warner_statement — ver detail_tables

data_quality_notes:
  public.vw_ft_dados_analiticos_union:
    - "10.264.535 linhas (2026-07-24, re-contado — era 10.3M em 2026-07-01)."
    - "CORRIGIDO (2026-07-24): `vw_debug_dsu_dados_analiticos` (a fonte de
       origem='DSU' nesta uniao) tinha DOIS problemas de contagem —
       (1) lia `ft_dsu_controle_contratos` direto, sem deduplicar os 25
       contratos com 2 linhas de status (mesmo bug ja corrigido em
       `ft_dsu_dados_analiticos`), overcounting a receita DSU em ~R$606mil;
       (2) NAO filtrava por `status`, entao contratos
       `FINANCEIRO/AGUARDAR` (nao confirmados, R$16,49M) e
       `CANCELADO/REMARCAR` (shows que nao aconteceram, R$1,29M) estavam
       somados junto com `CONFIRMADO` — quase metade (R$17,78M de
       R$37,46M) da receita DSU na uniao vinha de shows nao-realizados.
       Redefinida (DDL fora deste repo) para ler de
       `vw_dsu_contratos_calendario` (deduplicada) com `WHERE status =
       'CONFIRMADO'` — mesmo criterio ja usado pelo skill/tools
       `dsu-dia-critico`/`dsu_booking_quality`/`dsu_missed_opportunities`.
       DSU agora: 876 linhas (era 1.363), receita R$19.669.462,75 (era
       R$37.463.148,26)."
    - "period/revenue_period sao TEXT em grao mensal ('AAAA-MM'), identicos em
       todas as amostras observadas — nao ha granularidade diaria nesta view."
    - "origem inclui 'Omie' (ERP financeiro geral) e 'DSU' (shows ao vivo),
       nao apenas distribuidoras de streaming/publishing — 'performance de
       royalties' nesta base e mais amplo, cobrindo qualquer receita
       associada a um artista."
    - "quantity mapeado por origem (TODO.md item 2, 2026-07-22) — ver
       canonical_columns.quantity para o detalhe completo."
    - "CONFIRMADO (2026-07-22, TODO.md item 1): ft_somlivre_sonymusic NAO
       esta incluida nesta view. `pg_get_viewdef` mostra que a view uniona
       exatamente 6 `vw_debug_*` (DSU, Omie, Orchard, Universal, Warner
       Chappell, Warner Music) — nao existe `vw_debug_somlivre_sonymusic`.
       E uma fonte separada, so acessivel via `somlivre_detail`."
    - "origem='Omie' e uma inclusao PARCIAL e instavel, nao uma escolha
       deliberada (TODO.md item 3, investigado 2026-07-22, reconfirmado
       2026-07-24): `vw_debug_omie_dados_analiticos` exige
       `da.id IS NOT NULL` (match de artista bem-sucedido via fuzzy ILIKE
       contra dim_artistas.artista_keyword) para uma linha de Omie entrar
       na uniao. Como artista_keyword esta pouco preenchido (ver TODO.md
       item 9), a contagem de linhas de Omie na view continua mudando
       entre sessoes distintas, nao so dentro de uma unica sessao: 11 ->
       1944 -> 2001 -> 2004 (2026-07-22, ~5min) -> 5162 (2026-07-24) —
       mais que dobrou de uma sessao pra outra, confirmando escrita
       concorrente continua em dim_artistas fora deste repositorio (nao
       so um pico isolado). A fatia de Omie hoje representa so as linhas
       cujo `projeto` coincide por acaso com uma das poucas keywords
       cadastradas, nao o financeiro completo do Omie (que soma bem
       diferente do que aparece aqui) — decisao de manter/filtrar
       pendente com o time, ver TODO.md."
    - "coluna `cost` adicionada desde 2026-07-01: muito esparsa, so
       observada para origem='Omie'. Ver canonical_columns.cost — a
       contagem exata de linhas com cost preenchido tambem varia junto com
       a instabilidade de origem='Omie' descrita acima."
    - "NAO agregar com nenhuma detail_table (ver regra critica no topo do
       arquivo) — duplicaria valores ja contabilizados na uniao."
  universal:
    - "dim_musica e dim_compositor documentadas em detail_tables — uteis
       para enriquecer analises por faixa/compositor a partir de
       ft_universal_dados_analiticos.codigo_musica/compositor."
  warner_chappell:
    - "ft_warner_statement (23 colunas, documentada em detail_tables) e bem
       mais rica que a equivalente em public (ft_warner_chappell_dados_analiticos,
       11 colunas) — preferir a primeira para analises detalhadas."
