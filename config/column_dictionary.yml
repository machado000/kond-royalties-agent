      orchard_product_artist: {type: ARRAY}
      cod_sony: {type: TEXT}
      universal_compositor: {type: TEXT, description: "Chave de match exato para Universal (ver enrichment de ft_universal_dados_analiticos) — esparsa: 4/660 preenchido (2026-07-23), mesma classe de problema documentada no achado de investigacao abaixo."}
      warner_chappel_deal_scope_name: {type: ARRAY}
      warner_music_artist_name: {type: TEXT}

  # --- Achado de investigacao (2026-07-21): cobertura real do matching de artista ---
  # `dim_artistas` tem 660 linhas. As colunas dedicadas por plataforma
  # (`dsu_artista`, `omie_projeto`, `cod_sony`, `warner_chappel_deal_scope_name`,
  # `warner_music_artist_name`) e o campo fuzzy `artista_keyword` estao quase
  # todos vazios — sao chaves de matching praticamente nao preenchidas, nao
  # colunas com problema de codigo. Populacao observada em 2026-07-21:
  #   dsu_artista=6/660, omie_projeto=0/660, cod_sony=0/660,
  #   warner_chappel_deal_scope_name=1/660, warner_music_artist_name=4/660,
  #   artista_keyword=9/660, gravadora=36/660 (mas cobre a maior parte da
  #   receita — poucos artistas com gravadora preenchida concentram a maior
  #   parte do faturamento).
  # Taxa de match real por plataforma (artistas distintos casados/total):
  #   DSU: 6/7 (via dsu_artista, exato) — bom, catalogo pequeno
  #   Omie: 0/269 (via omie_projeto, exato) — sem cobertura
  #   Somlivre: 0/64 (via cod_sony, exato) — sem cobertura
  #   Warner Music: 1/59 (via warner_music_artist_name, exato) — sem cobertura
  #   Warner Chappell: 0/229 (via warner_chappel_deal_scope_name, exato) — sem cobertura
  #   Orchard/Universal: ja resolvido internamente pelas proprias views
  #   ft_orchard_dados_analiticos/ft_universal_dados_analiticos (ver abaixo)
  # Conclusao: enriquecer artist para omie_detail/somlivre_detail/
  # warner_chappell_detail/warner_music_detail via JOIN em dim_artistas NAO
  # e viavel hoje — nao e um problema de SQL/codigo, e falta de dado nas
  # colunas de chave de dim_artistas para essas 4 plataformas. Implementado
  # apenas para dsu_detail.artist (coalesce contra dsu_artista, 6/7 cobertos)
  # e para royalty_performance.gravadora (via matched_artista_id, ja
  # calculado na view unificada). Ver TODO.md item 9.

