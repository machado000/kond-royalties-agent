# Dicionario de colunas do agente KOND (royalties de artistas)
#
# STATUS: VALIDADO contra o banco real em 2026-07-21 (re-introspeccao apos
# mudancas de schema desde 2026-07-01 — ver `cost` em canonical_columns).
#
# A tabela de consulta configurada em config/postgres_sources.yml
# (query_source) e `public.vw_ft_dados_analiticos_union`: uma view que
# unifica, no schema `public`, as fact tables de todas as
# origens/distribuidoras em uma unica tabela larga. 10.3M linhas em
# 2026-07-01, contagem nao repetida em 2026-07-21.
#
# Convencao: o nome canonico (chave) e o que o agente e o catalogo semantico
# usam em `expression_hint` (ver semantic_catalog/catalog.yml) e nas
# dimensoes (usadas como nome de coluna literal em mcp_server/query_builder.py).
#
# REGRA CRITICA — NAO AGREGAR ENTRE NIVEIS: `public.vw_ft_dados_analiticos_union`
# e as `detail_tables` abaixo (`ft_*_dados_analiticos`, `ft_somlivre_sonymusic`,
# `warner_chappell.ft_warner_statement`, `vw_dsu_contratos_calendario`) representam OS MESMOS EVENTOS em
# niveis de granularidade diferentes. Somar/agregar valores da view unificada
# junto com valores de uma detail_table (ou de duas detail_tables entre si)
# DUPLICA receita/quantidade ja contabilizada. Usar a view unificada para
# perguntas cross-plataforma/agregadas; usar UMA UNICA detail_table por vez
# quando a pergunta pedir detalhe que a view nao tem (faixa, compositor,
# territorio, ISRC, etc.).
#
# REGRA CRITICA — IGNORAR `vw_debug_*`: essas views existem apenas como etapa
# de normalizacao de colunas para construir `vw_ft_dados_analiticos_union`
# (cada plataforma tem nomes de coluna diferentes; vw_debug_* padroniza antes
# da uniao). Nao sao fontes de dados para o agente.

canonical_columns:

  # --- Dimensao temporal ---
  period:
    description: >
      Periodo de referencia, grao MENSAL, formato texto 'AAAA-MM' (ex.:
      '2026-05'). NAO e uma coluna DATE — comparacoes de intervalo sao
      feitas por comparacao de string (funciona pois o formato ordena
      lexicograficamente igual a ordenacao cronologica).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.period
    notes:
      - "Existe tambem `revenue_period`, identico a `period` em todas as amostras observadas."

  # --- Dimensao de artista ---
  artist:
    description: >
      Nome do artista ja normalizado/casado (matched) contra
      `dim_artistas`. Preferir esta coluna a `artist_raw` (nome bruto como
      veio do arquivo de origem, antes do matching).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist

  # --- Dimensao de origem/distribuidora ---
  origem:
    description: >
      Sistema/distribuidora de onde a linha veio. Valores observados:
      'DSU', 'Omie', 'Orchard', 'Universal', 'Warner Chappell', 'Warner Music'.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origem
    notes:
      - "'Omie' e um sistema de ERP financeiro (contas a pagar/receber), nao
         um distribuidor de streaming — misturado nesta view junto com as
         fontes de royalties propriamente ditas."
      - "'DSU' cobre contratos/shows ao vivo (ver revenue_type='Shows'), nao
         apenas royalties de gravacao/edicao."

  # --- Dimensao de tipo de receita ---
  revenue_type:
    description: >
      Categoria/linha de negocio da receita. Valores observados: 'Editora'
      (publishing), 'Gravadora' (master/gravacao), 'Publicidade', 'Shows',
      'N/D' (nao definido).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.revenue_type

  # --- Metricas ---
  quantity:
    description: >
      Semantica mapeada por origem (TODO.md item 2, confirmado 2026-07-22):
      DSU (revenue_type='Shows') — sempre 1, contagem de shows/contratos,
      NAO de streams. Omie (todos os revenue_type) — sempre NULL, nao
      aplicavel (Omie e financeiro/ERP, sem conceito de "quantidade").
      Orchard/Universal/Warner Chappell/Warner Music (todos com
      revenue_type='Gravadora' na view unificada) — contagem real de
      streams/plays, valores tipicamente grandes (ate ~2*10^8 observado em
      Orchard); valores NEGATIVOS ocasionais em todas as 4 platforms sao
      esperados — linhas de ajuste/estorno de statements anteriores, nao
      erro de dado.
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.quantity

  revenue:
    description: >
      Valor monetario associado a linha (receita/royalty). Pode ser 0 (ex.:
      linhas de shows sem valor apurado ainda).
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.revenue

  cost:
    description: >
      Custo/despesa associada a linha — coluna nova desde 2026-07-01, ainda
      nao exposta no catalogo semantico. Muito esparsa (2.768 de 10.3M
      linhas em 2026-07-21) e observada SOMENTE para origem='Omie' (ERP
      financeiro), cobrindo varios revenue_type (Shows, N/D, Publicidade,
      Editora, Gravadora). Representa o lado "a pagar"/despesa do Omie,
      distinto de `revenue` (lado recebido). Nao usar para outras origens —
      sempre 0/nulo nelas nas amostras observadas.
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.cost

  # --- Colunas presentes na view mas AINDA NAO expostas no catalogo semantico ---
  # (documentadas para referencia futura, nao usadas em mcp_server/query_builder.py)
  razao_social:
    description: "Razao social da entidade legal associada a linha (ex.: gravadora/empresa do artista)."
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.razao_social
  origin_table:
    description: Nome da fact table de origem antes da uniao (lineage/debug).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origin_table
  matched_artista_id:
    description: FK para public.dim_artistas.id — permite enriquecer com gravadora, CPF, IDs por plataforma, etc.
    type: INTEGER
    source: public.vw_ft_dados_analiticos_union.matched_artista_id
  artist_raw:
    description: Nome do artista como veio do arquivo de origem, antes do matching contra dim_artistas.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist_raw

# Tabelas de detalhe por plataforma/origem — dados "limpos" por plataforma
# individual, usados para perguntas que pedem granularidade que a view
# unificada nao tem (faixa, compositor, ISRC, territorio, etc.). Ver a REGRA
# CRITICA no topo do arquivo sobre nao agregar com a view unificada.
detail_tables:

  public.ft_dsu_dados_analiticos:
    description: >
      SUPERSEDIDA para uso do agente (2026-07-23): `dsu_detail` aponta
      para `public.vw_dsu_contratos_calendario` (ver abaixo). CORRECAO
      (2026-07-23): a descricao anterior dizia que esta view "continua
      alimentando vw_ft_dados_analiticos_union" — isso estava ERRADO.
      `pg_get_viewdef` confirma que `vw_debug_dsu_dados_analiticos` (a
      etapa que realmente alimenta a uniao) sempre leu direto de
      `ft_dsu_controle_contratos`, nunca desta view — o nome
      `ft_dsu_dados_analiticos` so aparece la como um literal de texto
      cosmetico (`origin_table`). Ou seja, esta view ja estava orfa antes
      mesmo da migracao do `dsu_detail`. Redefinida no mesmo dia (DDL
      fora deste repo) para ler de `vw_dsu_contratos_calendario` em vez
      de `ft_dsu_controle_contratos` diretamente — mesmas 14 colunas/
      mesma ordem (mantido por compatibilidade com qualquer consumidor
      externo que ainda a referencie pelo nome), mas agora deduplicada
      (1.338 linhas, era 1.363). Nao ha mais motivo pratico para usar
      esta view em vez de `vw_dsu_contratos_calendario` diretamente.
    columns:
      id: {type: INTEGER}
      dt_cadastro: {type: DATE, description: Data de cadastro do contrato}
      contrato: {type: TEXT, description: Identificador/numero do contrato}
      artista: {type: TEXT}
      uf: {type: TEXT, description: Estado do show}
      cidade: {type: TEXT}
      local: {type: TEXT, description: Nome do local/casa de show}
      dt_show: {type: DATE, description: Data do show}
      status: {type: TEXT, description: Status do contrato}
      valor: {type: REAL, description: Valor bruto do contrato}
      falta_receber: {type: REAL, description: Saldo ainda nao recebido}
      valor_liquido: {type: REAL, description: Valor liquido do contrato}
      periodo: {type: TEXT, description: "Periodo 'AAAA-MM', equivalente ao `period` da view unificada"}
      source_file: {type: TEXT}

  public.ft_dsu_controle_contratos:
    description: >
      Tabela base por tras de `ft_dsu_dados_analiticos` e (via a nova
      view) de `dsu_detail`. 1.363 linhas (2026-07-22), `dt_show` de
      2025-08-01 a 2027-12-31 (482 linhas ja no futuro — pipeline de
      booking vivo, nao so historico). **25 `contrato` tem 2 linhas**
      (mesmo contrato/dt_show/valor, `status`/`inserted_at` diferentes —
      transicao de status ao longo do tempo, ex.: `FINANCEIRO/AGUARDAR`
      -> `CONFIRMADO`, ou `CONFIRMADO` -> `CANCELADO/REMARCAR`), NAO dois
      shows — qualquer consulta direta a esta tabela deve deduplicar por
      `contrato` mantendo so `max(inserted_at)`, ou usar
      `vw_dsu_contratos_calendario` (abaixo), que ja faz isso. `status`
      tem 4 valores: `CONFIRMADO` (885), `FINANCEIRO/AGUARDAR` (362,
      aguardando financeiro mas data reservada), `CANCELADO/REMARCAR`
      (115, data livre novamente) e `QUALIDADE` (1, isolado). So 7
      artistas distintos fazem shows DSU.
    columns:
      id: {type: INTEGER}
      dt_cadastro: {type: DATE}
      contrato: {type: TEXT, description: "Identificador do contrato — NAO unico sozinho, ver nota de dedup acima"}
      tag: {type: TEXT}
      contratante: {type: TEXT, description: Parte contratante do show}
      artista: {type: TEXT}
      uf: {type: TEXT}
      cidade: {type: TEXT}
      local: {type: TEXT}
      tipo_evento: {type: TEXT}
      dt_show: {type: DATE}
      status: {type: TEXT}
      valor: {type: REAL}
      falta_receber: {type: REAL}
      vendedor: {type: VARCHAR, description: Responsavel comercial pela venda}
      obs: {type: TEXT}
      source_file: {type: TEXT}
      inserted_at: {type: TIMESTAMPTZ, description: "Usado para dedup — ver nota acima"}

  public.dim_calendario:
    description: >
      Dimensao de calendario, 2026-01-01 a 2027-12-31 (730 dias) —
      forward-looking, cobre o futuro, nao so historico. `dia_critico`
      (boolean, 238/730 dias) ja vem pre-calculado: sexta e sabado
      (maioria, ~208 dias — vesperas de dia de descanso) mais uma cauda
      menor de dias de semana que sao vesperas de feriado/emenda. Nao
      recalcular essa logica — so consumir a coluna. Shows com
      `dt_show < 2026-01-01` nao tem correspondente aqui (join retorna
      null, nao false) — ~22% dos contratos DSU caem nessa lacuna
      (2026-07-23), entao filtrar `dia_critico is not null` ao calcular
      percentuais para nao distorcer o resultado.
    columns:
      ano_mes: {type: TEXT}
      data: {type: DATE, description: Chave primaria}
      dia_semana: {type: TEXT}
      dia_numero: {type: INTEGER}
      fim_de_semana: {type: BOOLEAN}
      feriado: {type: BOOLEAN}
      nome_feriado: {type: TEXT}
      uf_feriado: {type: TEXT}
      dia_critico: {type: BOOLEAN, description: "Sexta/sabado ou vespera de feriado — melhor dia para agendar um show"}

  public.vw_dsu_contratos_calendario:
    description: >
      View criada em 2026-07-23 especificamente para dar suporte a
      `dsu_detail` e ao skill `.claude/skills/dsu-dia-critico/`: dedup de
      `ft_dsu_controle_contratos` por `contrato` (so a linha com
      `max(inserted_at)` sobrevive) + LEFT JOIN com `dim_calendario` por
      `dt_show = data`. 1.338 linhas (2026-07-23, = 1.363 - 25
      duplicatas). `count(*)` sobre esta view conta contratos reais, sem
      risco de contagem dupla — ao contrario da tabela base
      (`ft_dsu_controle_contratos`), que nao dedup por contrato.
      `ft_dsu_dados_analiticos` foi redefinida em 2026-07-23 para ler
      desta view, entao tambem ja vem deduplicada.
    columns:
      id: {type: INTEGER}
      contrato: {type: TEXT}
      dt_cadastro: {type: DATE}
      tag: {type: TEXT}
      contratante: {type: TEXT}
      artista: {type: TEXT}
      uf: {type: TEXT}
      cidade: {type: TEXT}
      local: {type: TEXT}
      tipo_evento: {type: TEXT}
      dt_show: {type: DATE}
      status: {type: TEXT}
      valor: {type: REAL}
      falta_receber: {type: REAL}
      valor_liquido: {type: REAL, description: "valor - falta_receber"}
      vendedor: {type: VARCHAR}
      obs: {type: TEXT}
      source_file: {type: TEXT}
      inserted_at: {type: TIMESTAMPTZ}
      dia_semana: {type: TEXT, description: De dim_calendario, null se dt_show < 2026-01-01}
      fim_de_semana: {type: BOOLEAN}
      feriado: {type: BOOLEAN}
      nome_feriado: {type: TEXT}
      uf_feriado: {type: TEXT}
      dia_critico: {type: BOOLEAN, description: "Ver public.dim_calendario"}

  public.dim_omie_categoria:
    description: >
      Referencia/taxonomia de categorias contabeis do Omie (2026-07-23).
      223 linhas, colunas `id, tipo, grupo, categoria, ativo,
      inserted_at`, unique em (tipo, grupo, categoria). NAO e joinada em
      lugar nenhum — nem `ft_omie_dados_analiticos` nem
      `stg_omie_consolidado` tem uma coluna de FK apontando pra ela (ambas
      carregam tipo/grupo/categoria como texto solto). Tambem esta
      desatualizada como lista de referencia: 19 das 189 combinacoes
      (tipo, grupo, categoria) distintas realmente usadas em
      `ft_omie_dados_analiticos` NAO aparecem aqui (~10% de deriva, ex.:
      "Fotografo", "Iluminação", "Produção musical" faltando). Nao tratar
      como lista autoritativa nem tentar joinar — nao ha caminho de uso
      pelo agente hoje.

  public.dim_omie_grupo:
    description: >
      Filtro ativo/inativo de grupos contabeis do Omie — DIFERENTE de
      `dim_omie_categoria` (que e so referencia passiva), esta tabela e
      load-bearing: `ft_omie_dados_analiticos` faz
      `LEFT JOIN dim_omie_grupo og ON oc.grupo = og.grupo
      WHERE og.ativo IS TRUE`, entao qualquer linha Omie cujo `grupo` nao
      esteja marcado ativo aqui e excluida silenciosamente da view (ver
      `public.ft_omie_dados_analiticos` abaixo). 25 linhas, 15 ativas
      (2026-07-23). ATENCAO — bug latente na view (fora deste repo, nao
      corrigido): o JOIN usa so `grupo`, ignorando `tipo`; ha um valor de
      `grupo` duplicado ("Transferência", uma vez em cada `tipo`), hoje
      dormant porque ambas as linhas tem `ativo=false`, mas se qualquer
      uma for reativada sem a outra o JOIN pode multiplicar linhas Omie
      com esse grupo.
    columns:
      id: {type: INTEGER}
      tipo: {type: TEXT}
      grupo: {type: TEXT}
      ativo: {type: BOOLEAN}
      inserted_at: {type: TIMESTAMPTZ}

  public.ft_omie_dados_analiticos:
    description: >
      Contas a pagar/receber do ERP Omie (fonte de origem='Omie' na view
      unificada). 30 colunas — financeiro geral, nao especifico de
      royalties/streaming. 9.123 linhas (2026-07-23, cresce continuamente
      — e um feed financeiro vivo). ATENCAO: filtrada por
      `dim_omie_grupo` — qualquer linha cujo `grupo` nao esteja marcado
      `ativo=true` em `dim_omie_grupo` e excluida silenciosamente desta
      view (ver `public.dim_omie_grupo` abaixo). Isso significa que
      transacoes Omie podem "desaparecer" desta fonte sem erro algum se o
      grupo delas for desativado — nao e um bug da query, e o
      comportamento do JOIN na view base.
    columns:
      id: {type: INTEGER}
      minha_empresa_cnpj: {type: VARCHAR}
      minha_empresa_razao_social: {type: VARCHAR}
      minha_empresa_nome_fantasia: {type: VARCHAR}
      tipo: {type: VARCHAR, description: Tipo de conta (a pagar/a receber)}
      grupo: {type: VARCHAR}
      categoria: {type: VARCHAR}
      situacao: {type: VARCHAR}
      departamento: {type: VARCHAR}
      projeto: {type: VARCHAR, description: Projeto Omie — pode mapear a artista via `dim_artistas.omie_projeto`}
      data_de_inclusao: {type: DATE}
      data_de_vencimento: {type: DATE}
      ultima_data_de_pagto_ou_recbto: {type: DATE}
      dias_em_atraso: {type: INTEGER}
      situacao_do_vencimento: {type: VARCHAR}
      valor_da_conta: {type: NUMERIC}
      valor_liquido: {type: NUMERIC}
      juros: {type: NUMERIC}
      multa: {type: NUMERIC}
      desconto: {type: NUMERIC}
      pago_ou_recebido: {type: NUMERIC}
      a_pagar_ou_receber: {type: NUMERIC, description: "Provavel origem da coluna `cost` na view unificada"}
      numero_do_documento: {type: VARCHAR}
      parcela: {type: VARCHAR}
      cnpjcpf: {type: VARCHAR}
      cliente_ou_fornecedor_nome_fantasia: {type: VARCHAR}
      cliente_ou_fornecedor_razao_social: {type: VARCHAR}
      observacao_da_conta: {type: TEXT}
      observacao_do_pagto_ou_recbto: {type: TEXT}
      source_file: {type: TEXT}

  public.ft_orchard_dados_analiticos:
    description: >
      Statement Orchard (fonte de origem='Orchard' na view unificada). Tem
      detalhe de faixa (titulo_musica, ISRC) e territorio (pais) nao
      presentes na view unificada.
    columns:
      razao_social: {type: TEXT}
      apelido: {type: TEXT}
      plataforma: {type: TEXT, description: "DSP/plataforma de streaming — nao existe na view unificada"}
      tipo_receita: {type: TEXT}
      id: {type: INTEGER}
      nome_conta: {type: TEXT}
      pais: {type: TEXT, description: "Territorio — nao existe na view unificada"}
      loja: {type: TEXT, description: Loja/store de venda}
      artista_produto: {type: TEXT}
      produto: {type: TEXT, description: Album/release}
      artista_musica: {type: TEXT}
      titulo_musica: {type: TEXT, description: "Nome da faixa — nao existe na view unificada"}
      isrc: {type: TEXT, description: "Codigo ISRC da faixa — nao existe na view unificada"}
      moeda_conta: {type: CHAR}
      periodo_relatorio: {type: TEXT}
      quantidade: {type: INTEGER}
      valor_liquido_moeda_conta: {type: NUMERIC}
      matched_artista_keyword: {type: TEXT}
      matched_artista_id: {type: INTEGER, description: FK para public.dim_artistas.id}
      artist: {type: TEXT, description: Artista ja normalizado (mesmo padrao da view unificada)}
    enrichment: >
      Matching ja resolvido dentro da propria view (nao precisa de JOIN
      adicional no agente): `artista_produto` casado via ILIKE contra
      `dim_artistas.artista_keyword`. Titulos de faixa (`titulo_musica`)
      corrompidos (ex.: `????????????????????`) em ~0,59% das linhas
      (54.213 de 9.235.482 em 2026-07-23, era 53.672/9.362.461 em
      2026-07-21 — total de linhas caiu, provavel refresh/correcao a
      montante em `mv_ft_orchard_revenue`, taxa de corrupcao estavel) —
      problema de encoding na origem (arquivos de statement da Orchard),
      nao no agente nem na query. Ver TODO.md item 9b.

  public.ft_somlivre_sonymusic:
    description: >
      Statement Som Livre/Sony Music. CONFIRMADO (2026-07-22, TODO.md
      item 1): NAO esta incluida em `vw_ft_dados_analiticos_union` —
      `pg_get_viewdef` da uniao mostra exatamente 6 `vw_debug_*` (DSU,
      Omie, Orchard, Universal, Warner Chappell, Warner Music), sem
      `vw_debug_somlivre_sonymusic`. E uma fonte genuinamente separada,
      so acessivel via `somlivre_detail`. View simples sobre
      `stg_somlivre_sonymusic`, sem filtro/dedup. 85.919 linhas
      (re-verificado 2026-07-23, sem drift).
    columns:
      rec_number: {type: INTEGER}
      servico: {type: TEXT}
      numero_da_conta: {type: TEXT}
      nome_da_conta: {type: TEXT}
      servico_conta: {type: TEXT}
      data_extrato: {type: TEXT}
      forma_de_distribuicao: {type: TEXT}
      plataforma: {type: TEXT, description: DSP/plataforma}
      numero_da_faixa: {type: TEXT}
      artista_da_faixa: {type: TEXT}
      nome_da_faixa: {type: TEXT, description: Nome da faixa}
      unidades_de_pagamento: {type: INTEGER}
      royalty_liquido: {type: REAL}

  public.ft_universal_dados_analiticos:
    description: >
      Statement Universal Music (fonte de origem='Universal' na view
      unificada). Tem detalhe de faixa e compositor. 352.189 linhas
      (2026-07-23/24, sem drift vs amostra anterior).
    columns:
      razao_social: {type: TEXT}
      apelido: {type: TEXT}
      plataforma: {type: TEXT}
      tipo_receita: {type: TEXT}
      id: {type: INTEGER}
      nome_conta: {type: TEXT}
      data_extrato: {type: TEXT}
      media: {type: TEXT}
      canal: {type: TEXT}
      codigo_musica: {type: TEXT, description: "FK textual para universal.dim_musica.codigo_musica"}
      titulo_musica: {type: TEXT, description: "Nome da faixa — nao existe na view unificada"}
      compositor: {type: TEXT, description: "Nome do compositor — nao existe na view unificada"}
      unidades: {type: INTEGER}
      royalties_a_pagar: {type: NUMERIC}
      matched_artista_keyword: {type: TEXT}
      matched_artista_id: {type: INTEGER}
      artist: {type: TEXT}
    enrichment: >
      Matching ja resolvido dentro da propria view: join com
      `universal.dim_musica` por `codigo_musica` traz `compositor`, que e
      casado por igualdade exata contra `dim_artistas.universal_compositor`.
      `universal.dim_compositor` e apenas a tabela de normalizacao de
      `dim_musica.compositor` (enforce de unicidade) — nao adiciona nada
      alem do que ja vem via `dim_musica`, entao nao ha necessidade de
      join-la separadamente (TODO.md item 8). Taxa de match real
      (2026-07-23/24): 102.598 de 352.189 linhas (~29%) tem
      `matched_artista_id` preenchido — mesmo com so 4 valores distintos
      de `universal_compositor` cadastrados em `dim_artistas`, esses
      poucos compositores respondem por uma fatia relevante das linhas
      (compositores prolificos).

