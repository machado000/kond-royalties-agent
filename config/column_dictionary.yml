# Dicionario de colunas do agente KOND (royalties de artistas)
#
# STATUS: VALIDADO contra o banco real em 2026-07-21 (re-introspeccao apos
# mudancas de schema desde 2026-07-01 — ver `cost` em canonical_columns).
#
# A tabela de consulta configurada em config/postgres_sources.yml
# (query_source) e `public.vw_ft_dados_analiticos_union`: uma view que
# unifica, no schema `public`, as fact tables de todas as
# origens/distribuidoras em uma unica tabela larga. 10.3M linhas em
# 2026-07-01, contagem nao repetida em 2026-07-21.
#
# Convencao: o nome canonico (chave) e o que o agente e o catalogo semantico
# usam em `expression_hint` (ver semantic_catalog/catalog.yml) e nas
# dimensoes (usadas como nome de coluna literal em mcp_server/query_builder.py).
#
# REGRA CRITICA — NAO AGREGAR ENTRE NIVEIS: `public.vw_ft_dados_analiticos_union`
# e as `detail_tables` abaixo (`ft_*_dados_analiticos`, `ft_somlivre_sonymusic`,
# `warner_chappell.ft_warner_statement`) representam OS MESMOS EVENTOS em
# niveis de granularidade diferentes. Somar/agregar valores da view unificada
# junto com valores de uma detail_table (ou de duas detail_tables entre si)
# DUPLICA receita/quantidade ja contabilizada. Usar a view unificada para
# perguntas cross-plataforma/agregadas; usar UMA UNICA detail_table por vez
# quando a pergunta pedir detalhe que a view nao tem (faixa, compositor,
# territorio, ISRC, etc.).
#
# REGRA CRITICA — IGNORAR `vw_debug_*`: essas views existem apenas como etapa
# de normalizacao de colunas para construir `vw_ft_dados_analiticos_union`
# (cada plataforma tem nomes de coluna diferentes; vw_debug_* padroniza antes
# da uniao). Nao sao fontes de dados para o agente.

canonical_columns:

  # --- Dimensao temporal ---
  period:
    description: >
      Periodo de referencia, grao MENSAL, formato texto 'AAAA-MM' (ex.:
      '2026-05'). NAO e uma coluna DATE — comparacoes de intervalo sao
      feitas por comparacao de string (funciona pois o formato ordena
      lexicograficamente igual a ordenacao cronologica).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.period
    notes:
      - "Existe tambem `revenue_period`, identico a `period` em todas as amostras observadas."

  # --- Dimensao de artista ---
  artist:
    description: >
      Nome do artista ja normalizado/casado (matched) contra
      `dim_artistas`. Preferir esta coluna a `artist_raw` (nome bruto como
      veio do arquivo de origem, antes do matching).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist

  # --- Dimensao de origem/distribuidora ---
  origem:
    description: >
      Sistema/distribuidora de onde a linha veio. Valores observados:
      'DSU', 'Omie', 'Orchard', 'Universal', 'Warner Chappell', 'Warner Music'.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origem
    notes:
      - "'Omie' e um sistema de ERP financeiro (contas a pagar/receber), nao
         um distribuidor de streaming — misturado nesta view junto com as
         fontes de royalties propriamente ditas."
      - "'DSU' cobre contratos/shows ao vivo (ver revenue_type='Shows'), nao
         apenas royalties de gravacao/edicao."

  # --- Dimensao de tipo de receita ---
  revenue_type:
    description: >
      Categoria/linha de negocio da receita. Valores observados: 'Editora'
      (publishing), 'Gravadora' (master/gravacao), 'Publicidade', 'Shows',
      'N/D' (nao definido).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.revenue_type

  # --- Metricas ---
  quantity:
    description: >
      Quantidade associada a linha (streams, unidades ou contagem,
      dependendo de origem/revenue_type — ex.: para origem='DSU' e
      revenue_type='Shows', observado quantity=1 por show/contrato, nao
      contagem de streams).
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.quantity

  revenue:
    description: >
      Valor monetario associado a linha (receita/royalty). Pode ser 0 (ex.:
      linhas de shows sem valor apurado ainda).
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.revenue

  cost:
    description: >
      Custo/despesa associada a linha — coluna nova desde 2026-07-01, ainda
      nao exposta no catalogo semantico. Muito esparsa (2.768 de 10.3M
      linhas em 2026-07-21) e observada SOMENTE para origem='Omie' (ERP
      financeiro), cobrindo varios revenue_type (Shows, N/D, Publicidade,
      Editora, Gravadora). Representa o lado "a pagar"/despesa do Omie,
      distinto de `revenue` (lado recebido). Nao usar para outras origens —
      sempre 0/nulo nelas nas amostras observadas.
    type: NUMERIC
    source: public.vw_ft_dados_analiticos_union.cost

  # --- Colunas presentes na view mas AINDA NAO expostas no catalogo semantico ---
  # (documentadas para referencia futura, nao usadas em mcp_server/query_builder.py)
  razao_social:
    description: "Razao social da entidade legal associada a linha (ex.: gravadora/empresa do artista)."
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.razao_social
  origin_table:
    description: Nome da fact table de origem antes da uniao (lineage/debug).
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.origin_table
  matched_artista_id:
    description: FK para public.dim_artistas.id — permite enriquecer com gravadora, CPF, IDs por plataforma, etc.
    type: INTEGER
    source: public.vw_ft_dados_analiticos_union.matched_artista_id
  artist_raw:
    description: Nome do artista como veio do arquivo de origem, antes do matching contra dim_artistas.
    type: TEXT
    source: public.vw_ft_dados_analiticos_union.artist_raw

# Tabelas de detalhe por plataforma/origem — dados "limpos" por plataforma
# individual, usados para perguntas que pedem granularidade que a view
# unificada nao tem (faixa, compositor, ISRC, territorio, etc.). Ver a REGRA
# CRITICA no topo do arquivo sobre nao agregar com a view unificada.
detail_tables:

  public.ft_dsu_dados_analiticos:
    description: Contratos e shows ao vivo (fonte de origem='DSU' na view unificada).
    columns:
      id: {type: INTEGER}
      dt_cadastro: {type: DATE, description: Data de cadastro do contrato}
      contrato: {type: TEXT, description: Identificador/numero do contrato}
      artista: {type: TEXT}
      uf: {type: TEXT, description: Estado do show}
      cidade: {type: TEXT}
      local: {type: TEXT, description: Nome do local/casa de show}
      dt_show: {type: DATE, description: Data do show}
      status: {type: TEXT, description: Status do contrato}
      valor: {type: REAL, description: Valor bruto do contrato}
      falta_receber: {type: REAL, description: Saldo ainda nao recebido}
      valor_liquido: {type: REAL, description: Valor liquido do contrato}
      periodo: {type: TEXT, description: "Periodo 'AAAA-MM', equivalente ao `period` da view unificada"}
      source_file: {type: TEXT}

  public.ft_omie_dados_analiticos:
    description: >
      Contas a pagar/receber do ERP Omie (fonte de origem='Omie' na view
      unificada). 30 colunas — financeiro geral, nao especifico de
      royalties/streaming.
    columns:
      id: {type: INTEGER}
      minha_empresa_cnpj: {type: VARCHAR}
      minha_empresa_razao_social: {type: VARCHAR}
      minha_empresa_nome_fantasia: {type: VARCHAR}
      tipo: {type: VARCHAR, description: Tipo de conta (a pagar/a receber)}
