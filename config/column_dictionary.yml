      moeda_conta: {type: CHAR}
      periodo_relatorio: {type: TEXT}
      quantidade: {type: INTEGER}
      valor_liquido_moeda_conta: {type: NUMERIC}
      matched_artista_keyword: {type: TEXT}
      matched_artista_id: {type: INTEGER, description: FK para public.dim_artistas.id}
      artist: {type: TEXT, description: Artista ja normalizado (mesmo padrao da view unificada)}
    enrichment: >
      Matching ja resolvido dentro da propria view (nao precisa de JOIN
      adicional no agente): `artista_produto` casado via ILIKE contra
      `dim_artistas.artista_keyword`. Titulos de faixa (`titulo_musica`)
