    - ft_dsu_dados_analiticos          # SUPERSEDIDA para dsu_detail (usa vw_dsu_contratos_calendario) — NAO alimenta a uniao (essa le ft_dsu_controle_contratos direto), ver detail_tables
    - vw_dsu_contratos_calendario       # ATUAL — fonte real de dsu_detail desde 2026-07-23, ver detail_tables
    - ft_omie_dados_analiticos         # fonte de origem='Omie' na view unificada — ver detail_tables
    - ft_orchard_dados_analiticos      # fonte de origem='Orchard' na view unificada — ver detail_tables
