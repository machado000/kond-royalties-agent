data_quality_notes:
  public.vw_ft_dados_analiticos_union:
    - "10.3M linhas em 2026-07-01 (select count(*)); nao recontado em 2026-07-21."
    - "period/revenue_period sao TEXT em grao mensal ('AAAA-MM'), identicos em
       todas as amostras observadas — nao ha granularidade diaria nesta view."
    - "origem inclui 'Omie' (ERP financeiro geral) e 'DSU' (shows ao vivo),
       nao apenas distribuidoras de streaming/publishing — 'performance de
       royalties' nesta base e mais amplo, cobrindo qualquer receita
       associada a um artista."
    - "quantity=1 observado para origem='DSU' + revenue_type='Shows' —
       provavelmente contagem de shows/contratos, nao streams. O
       significado de quantity varia por origem/revenue_type e ainda nao
       foi mapeado exaustivamente."
    - "ft_somlivre_sonymusic nao apareceu nos valores distintos de origem
       observados na amostra inicial — confirmar se esta incluida na view
       ou se e uma fonte separada ainda nao unificada."
    - "coluna `cost` adicionada desde 2026-07-01: muito esparsa (2.768/10.3M
       linhas), so observada para origem='Omie'. Ver canonical_columns.cost."
    - "NAO agregar com nenhuma detail_table (ver regra critica no topo do
       arquivo) — duplicaria valores ja contabilizados na uniao."
  universal:
    - "dim_musica e dim_compositor documentadas em detail_tables — uteis
       para enriquecer analises por faixa/compositor a partir de
       ft_universal_dados_analiticos.codigo_musica/compositor."
  warner_chappell:
    - "ft_warner_statement (23 colunas, documentada em detail_tables) e bem
       mais rica que a equivalente em public (ft_warner_chappell_dados_analiticos,
       11 colunas) — preferir a primeira para analises detalhadas."
